{% extends "base.html" %}
{% block title %}Editar - {{ curso.nombre }}{% endblock %}

{% block content %}
<div style="display: flex; align-items: center; gap: 15px; margin-bottom: 25px;">
    <a href="{{ url_for('admin_cursos') }}" class="btn btn-secondary">← Volver</a>
    <h1 class="page-title" style="margin: 0;">Editar curso</h1>
</div>

<div class="card" style="max-width: 620px;">
    <form method="POST">
        <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">

        <div class="form-group">
            <label for="nombre">Nombre del curso *</label>
            <input type="text" id="nombre" name="nombre"
                   value="{{ curso.nombre }}" required>
        </div>

        <div class="form-group">
            <label for="descripcion">Descripcion</label>
            <textarea id="descripcion" name="descripcion">{{ curso.descripcion or '' }}</textarea>
        </div>

        <div class="form-group">
            <label for="tipo_video">Tipo de video</label>
            <select id="tipo_video" name="tipo_video">
                <option value="youtube" {% if curso.tipo_video == 'youtube' %}selected{% endif %}>
                    YouTube
                </option>
                <option value="vimeo" {% if curso.tipo_video == 'vimeo' %}selected{% endif %}>
                    Vimeo
                </option>
                <option value="drive" {% if curso.tipo_video == 'drive' %}selected{% endif %}>
                    Google Drive
                </option>
            </select>
        </div>

        <div class="form-group">
            <label for="video_url">URL del video *</label>
            <input type="text" id="video_url" name="video_url"
                   value="{{ curso.video_url }}" required>
        </div>

        <div style="display: flex; gap: 12px; flex-wrap: wrap;">
            <button type="submit" class="btn btn-primary">Guardar cambios</button>
            <a href="{{ url_for('admin_cursos') }}" class="btn btn-secondary">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
