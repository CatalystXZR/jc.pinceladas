{% extends "base.html" %}
{% block title %}Cambiar Contraseña{% endblock %}

{% block content %}
<div style="display: flex; align-items: center; gap: 15px; margin-bottom: 25px;">
    <a href="{{ url_for('admin_dashboard') }}" class="btn btn-secondary">← Volver</a>
    <h1 class="page-title" style="margin: 0;">Cambiar contraseña</h1>
</div>

<div class="card" style="max-width: 450px;">
    <form method="POST">
        <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
        <div class="form-group">
            <label for="actual">Contraseña actual</label>
            <input type="password" id="actual" name="actual" required>
        </div>

        <div class="form-group">
            <label for="nueva">Nueva contraseña</label>
            <input type="password" id="nueva" name="nueva" required minlength="8">
        </div>

        <div class="form-group">
            <label for="confirmar">Confirmar nueva contraseña</label>
            <input type="password" id="confirmar" name="confirmar" required minlength="8">
        </div>

        <button type="submit" class="btn btn-primary">Cambiar contraseña</button>
    </form>
</div>
{% endblock %}
